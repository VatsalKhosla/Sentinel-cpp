name: SafeCpp CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install LLVM and Clang
      run: |
        sudo apt-get update
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 20
        sudo apt-get install -y llvm-20-dev libclang-20-dev clang-20
    
    - name: Build SafeCpp
      run: |
        make clean
        make
    
    - name: Run Tests
      run: |
        make test
    
    - name: Test Output Formats
      run: |
        ./safecpp --format=json --output=results.json examples/use_after_free.cpp --
        ./safecpp --format=html --output=results.html examples/memory_leak.cpp --
        ./safecpp --format=sarif --output=results.sarif examples/null_pointer.cpp --
    
    - name: Upload SARIF Results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: results.sarif
    
    - name: Archive Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: analysis-reports
        path: |
          results.json
          results.html
          results.sarif

  analyze:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 20
        sudo apt-get install -y llvm-20-dev libclang-20-dev clang-20
    
    - name: Build
      run: make
    
    - name: Analyze Examples
      run: |
        for file in examples/*.cpp; do
          echo "Analyzing $file..."
          ./safecpp --format=json "$file" -- || true
        done
